<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Sphere Wallpaper</title>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050505;
      }

      * {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }

      canvas {
        display: block;
      }

      body {
        background-image: url(./assets/background.jpg);
      }

      .before,
      .after {
        display: block;
        color: white;

        position: absolute;
        top: 50%;
        transform: translateY(-50%);

        font-size: 144px;
      }

      .before {
        left: 12%;
      }

      .after {
        display: flex;
        align-items: center;
        flex-direction: column;
        gap: 30px;
        right: 2%;
      }

      .after img {
        display: block;
        width: 4em;
        height: 4em;

        animation: archAnimation 2s linear infinite;
      }

      @keyframes archAnimation {
        0% {
          filter: drop-shadow(0 0 0 #22ff2220);
        }
        50% {
          filter: drop-shadow(0 0 64px #22ff2280);
        }
        100% {
          filter: drop-shadow(0 0 0 #22ff2220);
        }
      }
    </style>
  </head>

  <body>
    <span class="before">Even</span>

    <span class="after">touches <img src="assets/grasstotouch.webp" /></span>
    <script type="module" src="./script.js"></script>
  </body>
</html>
